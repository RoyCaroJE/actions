name: Setup Node & NPM installation

description: Setup Node.js and install dependencies

inputs:
  node-version:
    description: Node.js version
    required: false
    default: "26"

runs:
  using: composite

  steps:
    - uses: actions/setup-node@v6.4.0
      with:
        node-version: ${{ inputs.node-version }}
        cache: npm

    - shell: bash
      run: npm ci
