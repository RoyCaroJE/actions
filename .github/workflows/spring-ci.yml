name: Spring CI

on:
  workflow_call:
    inputs:
      java-version:
        required: false
        type: string
        default: "21"

      test-command:
        required: false
        type: string
        default: "mvn -B -ntp test"

      build-command:
        required: false
        type: string
        default: "mvn -B -ntp clean package -DskipTests"

      postgres-version:
        required: false
        type: string
        default: "15"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: RoyCaroJE/actions/actions/setup-java-maven@v1.1
        with:
          java-version: ${{ inputs.java-version }}

      - name: Run Tests
        run: ${{ inputs.test-command }}

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: RoyCaroJE/actions/actions/setup-java-maven@v1.1
        with:
          java-version: ${{ inputs.java-version }}

      - name: Build Application
        run: ${{ inputs.build-command }}
